name: 'Setup Climate-Specific Dependencies'
description: 'Install conda-only climate packages (esmpy, climlab-rrtmg) into the pip Python env via micromamba'

inputs:
  skip-esmpy:
    description: 'Skip esmpy installation (set true if notebook does not use xesmf)'
    required: false
    default: 'false'
  skip-climlab-rrtmg:
    description: 'Skip climlab-rrtmg installation (set true if notebook does not use rrtmg)'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Install micromamba binary
      uses: mamba-org/setup-micromamba@v3
      with:
        micromamba-version: 'latest'
        # Do not create an environment - we only want the micromamba binary
        # to install conda packages into the existing pip Python prefix
        init-shell: none
        generate-run-shell: false
        cache-downloads: true
        cache-environment: false

    - name: Install esmpy into pip Python prefix
      if: inputs.skip-esmpy != 'true'
      shell: bash
      run: |
        # Install into the same prefix that actions/setup-python created
        # $pythonLocation is set by actions/setup-python
        micromamba install --prefix "$pythonLocation" -c conda-forge esmpy --yes
        python -c "import esmpy; print(f'esmpy version: {esmpy.__version__}')"

    - name: Install climlab-rrtmg into pip Python prefix
      if: inputs.skip-climlab-rrtmg != 'true'
      shell: bash
      run: |
        micromamba install --prefix "$pythonLocation" -c conda-forge climlab-rrtmg --yes
        python -c "import climlab_rrtmg; print('climlab-rrtmg installed')"
