name: 'Setup Climate-Specific Dependencies'
description: 'Install conda-only climate packages (esmpy, climlab-rrtmg) via micromamba and expose them to the pip Python env'

inputs:
  skip-esmpy:
    description: 'Skip esmpy installation (set true if notebook does not use xesmf)'
    required: false
    default: 'false'
  skip-climlab-rrtmg:
    description: 'Skip climlab-rrtmg installation (set true if notebook does not use rrtmg)'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Install micromamba binary
      uses: mamba-org/setup-micromamba@v3
      with:
        micromamba-version: 'latest'
        # Create a minimal env with just the conda-only packages
        environment-name: climate-deps
        create-args: >-
          python=3.10
          esmpy
          climlab-rrtmg
        init-shell: none
        generate-run-shell: false
        cache-downloads: true
        cache-environment: true

    - name: Copy conda packages into pip site-packages
      shell: bash
      run: |
        CONDA_SP=$(micromamba run -n climate-deps python -c "import site; print(site.getsitepackages()[0])")
        PIP_SP=$(python -c "import site; print(site.getsitepackages()[0])")
        echo "Conda site-packages: $CONDA_SP"
        echo "Pip site-packages:   $PIP_SP"

        # Copy only the specific packages we need — avoids ABI conflicts from
        # conda's numpy/pandas being added to PYTHONPATH alongside pip's versions
        for pkg in esmpy ESMF climlab_rrtmg; do
          if [ -d "$CONDA_SP/$pkg" ]; then
            cp -r "$CONDA_SP/$pkg" "$PIP_SP/"
            echo "Copied $pkg"
          fi
          # Also copy any top-level .so files (e.g. ESMF.cpython-*.so)
          for f in "$CONDA_SP"/${pkg}*.so "$CONDA_SP"/${pkg}*.py; do
            [ -f "$f" ] && cp "$f" "$PIP_SP/" && echo "Copied $(basename $f)"
          done
        done

        # Set ESMFMKFILE which xesmf needs to locate the ESMF shared library
        ESMF_MK=$(find "$CONDA_SP/../.." -name "esmf.mk" 2>/dev/null | head -1)
        if [ -n "$ESMF_MK" ]; then
          echo "ESMFMKFILE=$ESMF_MK" >> $GITHUB_ENV
          echo "ESMFMKFILE=$ESMF_MK"
        fi

    - name: Verify imports
      shell: bash
      run: |
        python -c "import esmpy; print(f'esmpy: {esmpy.__version__}')"
        python -c "import climlab_rrtmg; print('climlab-rrtmg: OK')"
