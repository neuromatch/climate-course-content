name: publish-book

on:
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash -el {0}

env:
  NB_KERNEL: python
  NMA_REPO: climate-course-content
  NMA_MAIN_BRANCH: main
  PREREQ_INTRO: ClimateScience
  ORG: neuromatch

# This job installs dependencies, builds the book, and pushes it to `gh-pages`
jobs:
  build-and-deploy-book:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commit message
        run: |
          readonly local msg=$(git log -1 --pretty=format:"%s")
          echo "COMMIT_MESSAGE=$msg" >> $GITHUB_ENV

      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env

      - name: Install Jupyter Book
        run: pip install jupyter-book==0.14.0 ghp-import

      - name: Setup CI tools
        uses: ./.github/actions/setup-ci-tools
        with:
          commit-message: ${{ env.COMMIT_MESSAGE }}
          stub-widgets: 'false'

      - name: Setup rendering dependencies
        if: "!contains(env.COMMIT_MESSAGE, 'skip ci')"
        uses: ./.github/actions/setup-rendering-deps

      - name: Get date for cache rotation
        id: cache-date
        run: echo "date=$(date +'%Y-%m')" >> $GITHUB_OUTPUT

      - name: Cache Jupyter execution
        uses: actions/cache@v4
        with:
          path: book/.jupyter-cache
          key: jupyter-exec-${{ steps.cache-date.outputs.date }}-${{ hashFiles('tutorials/**/*.ipynb', 'environment.yml') }}
          restore-keys: |
            jupyter-exec-${{ steps.cache-date.outputs.date }}-
            jupyter-exec-

      - name: Build student book
        run: |
          nmaci generate-book student
          jupyter-book toc migrate /home/runner/work/climate-course-content/climate-course-content/book/_toc.yml -o /home/runner/work/climate-course-content/climate-course-content/book/_toc.yml
          ln -s ../tutorials book/tutorials
          ln -s ../projects book/projects
          jupyter-book build book
          nmaci parse-html student

      - name: Publish to gh-pages
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          ghp-import -n -p -f -c "comptools.climatematch.io" -m "Update course book" book/_build/html
